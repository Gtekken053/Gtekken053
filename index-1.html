<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G — Pro Gamer</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0a0a0a;
    --bg2:     #111111;
    --bg3:     #1a1a1a;
    --text:    #e8e8e8;
    --muted:   #888;
    --gold:    #c8a86b;
    --gold2:   #a8863f;
    --white:   #ffffff;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    line-height: 1.6;
  }

  /* ─── NAV ─── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; justify-content: space-between; align-items: center;
    padding: 1.2rem 2.5rem;
    background: rgba(10,10,10,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid #222;
  }
  .nav-logo {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 1.6rem;
    color: var(--gold);
    letter-spacing: 0.05em;
  }
  .nav-links { display: flex; gap: 2rem; }
  .nav-links a {
    color: var(--muted); text-decoration: none; font-size: 0.85rem;
    letter-spacing: 0.1em; text-transform: uppercase;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--gold); }

  /* ─── HERO ─── */
  .hero {
    min-height: 100vh;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    text-align: center;
    position: relative; overflow: hidden;
    padding: 6rem 2rem 4rem;
  }
  .hero-G {
    position: absolute;
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(18rem, 40vw, 36rem);
    color: rgba(200,168,107,0.04);
    user-select: none; pointer-events: none;
    line-height: 1;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
  }
  .hero-tag {
    font-size: 0.78rem; letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 1.2rem;
  }
  .hero-name {
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(3.5rem, 10vw, 8rem);
    color: var(--white);
    line-height: 1; margin-bottom: 0.5rem;
    position: relative;
  }
  .hero-name span { color: var(--gold); }
  .hero-sub {
    font-size: clamp(1rem, 2.5vw, 1.4rem);
    color: var(--muted);
    letter-spacing: 0.12em; text-transform: uppercase;
    margin-bottom: 2.5rem;
  }
  .hero-badges {
    display: flex; gap: 0.8rem; flex-wrap: wrap; justify-content: center;
    margin-bottom: 3rem;
  }
  .badge {
    border: 1px solid var(--gold2);
    color: var(--gold);
    padding: 0.35rem 1rem;
    font-size: 0.78rem; letter-spacing: 0.15em; text-transform: uppercase;
  }
  .hero-cta {
    display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;
  }
  .btn {
    padding: 0.75rem 2rem;
    font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase;
    text-decoration: none; font-weight: 600;
    transition: all 0.2s;
  }
  .btn-gold {
    background: var(--gold); color: #000;
  }
  .btn-gold:hover { background: var(--gold2); }
  .btn-outline {
    border: 1px solid var(--gold); color: var(--gold); background: transparent;
  }
  .btn-outline:hover { background: var(--gold); color: #000; }

  /* ─── SECTIONS ─── */
  section { padding: 6rem 2rem; max-width: 1000px; margin: 0 auto; }
  .section-label {
    font-size: 0.72rem; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 0.8rem;
  }
  .section-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(2rem, 5vw, 3rem);
    color: var(--white); margin-bottom: 3rem;
    border-bottom: 1px solid #222; padding-bottom: 1.2rem;
  }

  /* ─── ACHIEVEMENTS ─── */
  .achievements-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.5rem;
  }
  .achievement-card {
    background: var(--bg3);
    border: 1px solid #222;
    padding: 1.8rem;
    position: relative; overflow: hidden;
    transition: border-color 0.2s;
  }
  .achievement-card:hover { border-color: var(--gold2); }
  .achievement-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--gold), transparent);
  }
  .achievement-year {
    font-size: 0.72rem; letter-spacing: 0.2em; color: var(--gold);
    margin-bottom: 0.5rem;
  }
  .achievement-title {
    font-weight: 700; font-size: 1.05rem; color: var(--white);
    margin-bottom: 0.3rem;
  }
  .achievement-desc { font-size: 0.88rem; color: var(--muted); }

  /* ─── DEVICES ─── */
  .devices-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1.2rem;
  }
  .device-card {
    background: var(--bg2);
    border: 1px solid #1e1e1e;
    padding: 1.4rem 1.6rem;
    transition: border-color 0.2s;
  }
  .device-card:hover { border-color: #333; }
  .device-category {
    font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 0.4rem;
  }
  .device-name { font-weight: 600; color: var(--white); font-size: 0.95rem; }
  .device-model { font-size: 0.82rem; color: var(--muted); margin-top: 0.2rem; }

  /* ─── LINKS ─── */
  .links-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1rem;
  }
  .link-card {
    display: flex; align-items: center; gap: 1rem;
    background: var(--bg3);
    border: 1px solid #222;
    padding: 1.2rem 1.5rem;
    text-decoration: none; color: var(--text);
    transition: all 0.2s;
  }
  .link-card:hover { border-color: var(--gold2); color: var(--gold); }
  .link-icon { font-size: 1.4rem; }
  .link-label { font-size: 0.82rem; letter-spacing: 0.1em; text-transform: uppercase; }
  .link-handle { font-size: 0.72rem; color: var(--muted); }

  /* ─── FOOTER ─── */
  footer {
    text-align: center; padding: 3rem 1rem;
    border-top: 1px solid #1a1a1a;
    color: var(--muted); font-size: 0.8rem;
    letter-spacing: 0.1em;
  }
  footer span { color: var(--gold); }

  @media (max-width: 600px) {
    nav { padding: 1rem 1.2rem; }
    .nav-links { gap: 1rem; }
    section { padding: 4rem 1.2rem; }
  }
</style>
</head>
<body>

<script>
/* ================================================================
   ★ 編集はここだけ！PROFILE セクションを自由に変更してください ★
   ================================================================ */
const PROFILE = {
  /* 基本情報 */
  initial:    "G",                          // ロゴの頭文字
  name:       "G",                          // ヒーローに表示する名前（強調部分）
  namePrefix: "",                           // 名前の前に付けるテキスト（例: "PRO GAMER"）
  tagline:    "Pro Gamer / Content Creator",// サブタイトル
  tags:       ["プロライセンス保持", "eスポーツ選手", "副業プロゲーマー"], // バッジ

  /* ボタン */
  ctaButtons: [
    { label: "配信を見る",  href: "https://twitch.tv/YOUR_CHANNEL",  style: "gold" },
    { label: "お問い合わせ", href: "mailto:your@email.com",           style: "outline" },
  ],

  /* 実績リスト */
  achievements: [
    { year: "2024", title: "全国大会 ○○部門", desc: "準優勝 / チーム戦" },
    { year: "2023", title: "オンライントーナメント ××", desc: "優勝 / ソロ戦" },
    { year: "2023", title: "プロライセンス取得", desc: "○○協会認定" },
    { year: "2022", title: "地域予選 △△", desc: "優勝 / ソロ戦" },
  ],

  /* 使用デバイスリスト */
  devices: [
    { category: "Monitor",    name: "Samsung Odyssey",   model: "G7 27\" 240Hz OLED" },
    { category: "Mouse",      name: "Logicool G Pro X",  model: "Superlight 2" },
    { category: "Keyboard",   name: "Wooting 60HE",      model: "Analog" },
    { category: "Headset",    name: "SteelSeries Arctis", model: "Nova Pro Wireless" },
    { category: "Controller", name: "DualSense Edge",    model: "PlayStation 5" },
    { category: "PC",         name: "Custom Build",      model: "RTX 4090 / i9-14900K" },
  ],

  /* SNS・配信リンク */
  links: [
    { icon: "🎮", label: "Twitch",    handle: "@your_handle", href: "https://twitch.tv/YOUR_CHANNEL" },
    { icon: "▶️", label: "YouTube",   handle: "@your_handle", href: "https://youtube.com/@YOUR_CHANNEL" },
    { icon: "🐦", label: "X (Twitter)", handle: "@your_handle", href: "https://x.com/YOUR_HANDLE" },
    { icon: "📸", label: "Instagram", handle: "@your_handle", href: "https://instagram.com/YOUR_HANDLE" },
    { icon: "💬", label: "Discord",   handle: "サーバーに参加",  href: "https://discord.gg/YOUR_SERVER" },
  ],

  /* フッター */
  footerText: "© 2025",
};
/* ================================================================
   ★ 編集ここまで — 以下は触らなくてOKです ★
   ================================================================ */


// ─── Build page ───────────────────────────────────────────────

document.addEventListener("DOMContentLoaded", () => {

  // NAV
  document.querySelector(".nav-logo").textContent = PROFILE.initial;
  document.querySelector(".nav-links").innerHTML = `
    <a href="#achievements">実績</a>
    <a href="#devices">デバイス</a>
    <a href="#links">リンク</a>
  `;

  // HERO
  document.querySelector(".hero-G").textContent   = PROFILE.initial;
  document.querySelector(".hero-name").innerHTML  =
    (PROFILE.namePrefix ? `${PROFILE.namePrefix} ` : "") +
    `<span>${PROFILE.name}</span>`;
  document.querySelector(".hero-sub").textContent = PROFILE.tagline;

  document.querySelector(".hero-badges").innerHTML =
    PROFILE.tags.map(t => `<span class="badge">${t}</span>`).join("");

  document.querySelector(".hero-cta").innerHTML =
    PROFILE.ctaButtons.map(b =>
      `<a href="${b.href}" class="btn btn-${b.style === "gold" ? "gold" : "outline"}">${b.label}</a>`
    ).join("");

  // ACHIEVEMENTS
  document.querySelector(".achievements-grid").innerHTML =
    PROFILE.achievements.map(a => `
      <div class="achievement-card">
        <div class="achievement-year">${a.year}</div>
        <div class="achievement-title">${a.title}</div>
        <div class="achievement-desc">${a.desc}</div>
      </div>
    `).join("");

  // DEVICES
  document.querySelector(".devices-grid").innerHTML =
    PROFILE.devices.map(d => `
      <div class="device-card">
        <div class="device-category">${d.category}</div>
        <div class="device-name">${d.name}</div>
        <div class="device-model">${d.model}</div>
      </div>
    `).join("");

  // LINKS
  document.querySelector(".links-grid").innerHTML =
    PROFILE.links.map(l => `
      <a href="${l.href}" class="link-card" target="_blank" rel="noopener">
        <span class="link-icon">${l.icon}</span>
        <div>
          <div class="link-label">${l.label}</div>
          <div class="link-handle">${l.handle}</div>
        </div>
      </a>
    `).join("");

  // FOOTER
  document.querySelector(".footer-text").innerHTML =
    `${PROFILE.footerText} <span>${PROFILE.initial}</span> — All rights reserved.`;
});
</script>

<!-- NAV -->
<nav>
  <div class="nav-logo"></div>
  <div class="nav-links"></div>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="hero-G"></div>
  <div class="hero-tag">Pro Gamer Profile</div>
  <h1 class="hero-name"></h1>
  <p class="hero-sub"></p>
  <div class="hero-badges"></div>
  <div class="hero-cta"></div>
</div>

<!-- ACHIEVEMENTS -->
<section id="achievements">
  <div class="section-label">Career</div>
  <h2 class="section-title">実績</h2>
  <div class="achievements-grid"></div>
</section>

<!-- DEVICES -->
<section id="devices">
  <div class="section-label">Setup</div>
  <h2 class="section-title">使用デバイス</h2>
  <div class="devices-grid"></div>
</section>

<!-- LINKS -->
<section id="links">
  <div class="section-label">Follow</div>
  <h2 class="section-title">SNS / 配信</h2>
  <div class="links-grid"></div>
</section>

<footer>
  <p class="footer-text"></p>
</footer>

</body>
</html>
